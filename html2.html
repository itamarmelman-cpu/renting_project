<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aguda2Go - Smart locker system for student equipment rentals">
    <title>Aguda2Go - Cart</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-default-route="cart">
        <script>
            (function(){
                const root = document.body;
                if (!root) return;
                const route = root.getAttribute('data-default-route') || '/locker';
                location.replace(location.pathname + '#'+route);
            })();
        </script>
    <script type="module" src="app.js"></script>
</body>
</html>
