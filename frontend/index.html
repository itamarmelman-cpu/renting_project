<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AguGo - Smart locker system for student equipment rentals">
    <title>AguGo - Catalog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body data-default-route="catalog">
        <script>
            // simple redirect to single app entry
            (function(){
                const root = document.body; // Changed to document.body to access data-default-route
                if (!root) return;
                const route = root.getAttribute('data-default-route') || 'catalog';
                location.replace(location.pathname + '#'+route);
            })();
        </script>
        <script type="module" src="app.js"></script>
</body>
</html>
